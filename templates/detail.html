<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ticket Detail | Support CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center shadow-sm">
    <span class="text-xl font-bold text-blue-600">🎫 Support CRM</span>
    <a href="/" class="text-sm text-gray-600 hover:text-blue-600 font-medium">← Back to Tickets</a>
  </nav>

  <div class="max-w-4xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-6">

    <!-- Left: Main Info -->
    <div class="md:col-span-2 space-y-5">

      <!-- Ticket Header -->
      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
        <div class="flex items-start justify-between mb-3">
          <span id="ticketId" class="font-mono text-xs text-blue-500 bg-blue-50 px-2 py-1 rounded"></span>
          <span id="statusBadge" class="px-3 py-1 rounded-full text-xs font-semibold"></span>
        </div>
        <h2 id="subject" class="text-xl font-bold text-gray-800 mb-4"></h2>
        <p id="description" class="text-sm text-gray-600 leading-relaxed whitespace-pre-wrap"></p>
      </div>

      <!-- Notes / Comments -->
      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
        <h3 class="font-semibold text-gray-800 mb-4">💬 Comments</h3>
        <div id="notesList" class="space-y-4 mb-6"></div>

        <!-- Add comment -->
        <div class="border-t border-gray-100 pt-4">
          <textarea id="noteInput" rows="3"
            placeholder="Add a comment or update..."
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none mb-3"></textarea>
          <button onclick="addNote()"
            class="bg-blue-600 text-white text-sm font-semibold px-5 py-2 rounded-lg hover:bg-blue-700 transition">
            Post Comment
          </button>
        </div>
      </div>
    </div>

    <!-- Right: Sidebar -->
    <div class="space-y-5">

      <!-- Ticket Meta -->
      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5">
        <h3 class="font-semibold text-gray-700 text-sm mb-4">Ticket Details</h3>
        <div class="space-y-3 text-sm">
          <div class="flex justify-between">
            <span class="text-gray-500">Raised by</span>
            <span id="creatorName" class="font-medium text-gray-800"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-500">Assigned to</span>
            <span id="assigneeName" class="font-medium text-gray-800"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-500">Priority</span>
            <span id="priorityBadge"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-500">Created</span>
            <span id="createdAt" class="text-gray-600"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-500">Updated</span>
            <span id="updatedAt" class="text-gray-600"></span>
          </div>
        </div>
      </div>

      <!-- Update Status (admin/agent only) -->
      <div id="updatePanel" class="hidden bg-white rounded-2xl border border-gray-200 shadow-sm p-5">
        <h3 class="font-semibold text-gray-700 text-sm mb-4">Update Ticket</h3>

        <label class="block text-xs text-gray-500 mb-1">Status</label>
        <select id="statusSelect"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 mb-3">
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Closed">Closed</option>
        </select>

        <label class="block text-xs text-gray-500 mb-1">Priority</label>
        <select id="prioritySelect"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 mb-3">
          <option value="Low">🟢 Low</option>
          <option value="Medium">🟡 Medium</option>
          <option value="High">🟠 High</option>
          <option value="Urgent">🔴 Urgent</option>
        </select>

        <label id="assignLabel" class="hidden block text-xs text-gray-500 mb-1">Assign To</label>
        <select id="assignSelect"
          class="hidden w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 mb-4">
          <option value="">Unassigned</option>
        </select>

        <button onclick="updateTicket()"
          class="w-full bg-indigo-600 text-white text-sm font-semibold py-2 rounded-lg hover:bg-indigo-700 transition">
          Save Changes
        </button>
      </div>

      <!-- Delete (admin only) -->
      <div id="deletePanel" class="hidden">
        <button onclick="deleteTicket()"
          class="w-full border border-red-300 text-red-500 text-sm font-semibold py-2 rounded-lg hover:bg-red-50 transition">
          🗑 Delete Ticket
        </button>
      </div>

    </div>
  </div>

  <script>
    const ticketId = window.location.pathname.split("/").pop();
    let currentUser = null;

    const statusColors = {
      "Open": "bg-green-100 text-green-700",
      "In Progress": "bg-yellow-100 text-yellow-700",
      "Closed": "bg-gray-100 text-gray-600"
    };

    const priorityColors = {
      "Urgent": "bg-red-100 text-red-700",
      "High": "bg-orange-100 text-orange-700",
      "Medium": "bg-yellow-100 text-yellow-700",
      "Low": "bg-green-100 text-green-700"
    };

    async function loadTicket() {
      const [meRes, ticketRes] = await Promise.all([
        fetch("/api/me"),
        fetch(`/api/tickets/${ticketId}`)
      ]);
      currentUser = await meRes.json();
      const t = await ticketRes.json();

      document.getElementById("ticketId").textContent = t.ticket_id;
      document.getElementById("subject").textContent = t.subject;
      document.getElementById("description").textContent = t.description;
      document.getElementById("creatorName").textContent = t.creator_name || "Unknown";
      document.getElementById("assigneeName").textContent = t.assignee_name || "Unassigned";
      document.getElementById("createdAt").textContent = t.created_at?.split(" ")[0];
      document.getElementById("updatedAt").textContent = t.updated_at?.split(" ")[0];

      const statusBadge = document.getElementById("statusBadge");
      statusBadge.textContent = t.status;
      statusBadge.className = `px-3 py-1 rounded-full text-xs font-semibold ${statusColors[t.status]}`;

      const priorityBadge = document.getElementById("priorityBadge");
      priorityBadge.textContent = t.priority;
      priorityBadge.className = `px-2 py-0.5 rounded-full text-xs font-semibold ${priorityColors[t.priority]}`;

      if (currentUser.role === "admin" || currentUser.role === "agent") {
        document.getElementById("updatePanel").classList.remove("hidden");
        document.getElementById("statusSelect").value = t.status;
        document.getElementById("prioritySelect").value = t.priority;
      } else {
        // customers: hide the entire update panel
        document.getElementById("updatePanel").classList.add("hidden");
        document.getElementById("deletePanel").classList.add("hidden");
      }

      // Show assign dropdown for admin
      if (currentUser.role === "admin") {
        document.getElementById("deletePanel").classList.remove("hidden");
        document.getElementById("assignLabel").classList.remove("hidden");
        document.getElementById("assignSelect").classList.remove("hidden");
        const agentsRes = await fetch("/api/agents");
        const agents = await agentsRes.json();
        const sel = document.getElementById("assignSelect");
        agents.forEach(a => {
          const opt = document.createElement("option");
          opt.value = a.id;
          opt.textContent = a.name;
          if (a.id === t.assigned_to) opt.selected = true;
          sel.appendChild(opt);
        });
      }

      // Render notes
      const notesList = document.getElementById("notesList");
      if (t.notes && t.notes.length > 0) {
        notesList.innerHTML = t.notes.map(n => `
          <div class="flex gap-3">
            <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-sm font-bold flex-shrink-0">
              ${(n.author_name || "?")[0].toUpperCase()}
            </div>
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-1">
                <span class="text-sm font-semibold text-gray-700">${n.author_name || "Unknown"}</span>
                <span class="text-xs text-gray-400">${n.created_at}</span>
              </div>
              <p class="text-sm text-gray-600 bg-gray-50 rounded-lg px-3 py-2">${n.note_text}</p>
            </div>
          </div>
        `).join("");
      } else {
        notesList.innerHTML = `<p class="text-sm text-gray-400 text-center py-4">No comments yet. Be the first!</p>`;
      }
    }

    async function updateTicket() {
      const body = {
        status: document.getElementById("statusSelect").value,
        priority: document.getElementById("prioritySelect").value,
      };
      const assignVal = document.getElementById("assignSelect").value;
      if (assignVal) body.assigned_to = parseInt(assignVal);

      await fetch(`/api/tickets/${ticketId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      loadTicket();
    }

    async function addNote() {
      const note = document.getElementById("noteInput").value.trim();
      if (!note) return alert("Please write something first.");
      await fetch(`/api/tickets/${ticketId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ note })
      });
      document.getElementById("noteInput").value = "";
      loadTicket();
    }

    async function deleteTicket() {
      if (!confirm("Are you sure you want to delete this ticket?")) return;
      await fetch(`/api/tickets/${ticketId}`, { method: "DELETE" });
      window.location.href = "/";
    }

    loadTicket();
  </script>
</body>
</html>
