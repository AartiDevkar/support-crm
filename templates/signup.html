<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | Support CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">🎫</div>
      <h1 class="text-2xl font-bold text-gray-800">Create Account</h1>
      <p class="text-gray-500 text-sm mt-1">Join Support CRM</p>
    </div>

    <div id="errorMsg" class="hidden bg-red-50 text-red-600 text-sm px-4 py-2 rounded-lg mb-4 text-center">
      Email already registered. Try logging in.
    </div>

    <form action="/signup" method="POST" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input name="name" type="text" required placeholder="Aarti Devkar"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input name="email" type="email" required placeholder="you@example.com"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input name="password" type="password" required placeholder="Min. 6 characters"
          minlength="6"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm"/>
      </div>
      <button type="submit"
        class="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition text-sm">
        Create Account
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account?
      <a href="/login" class="text-blue-600 font-medium hover:underline">Sign in</a>
    </p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("error")) document.getElementById("errorMsg").classList.remove("hidden");
  </script>
</body>
</html>
