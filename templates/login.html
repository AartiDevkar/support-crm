<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Support CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">🎫</div>
      <h1 class="text-2xl font-bold text-gray-800">Support CRM</h1>
      <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
    </div>

    <!-- Success message after signup -->
    <div id="signupSuccess" class="hidden bg-green-50 text-green-700 text-sm px-4 py-2 rounded-lg mb-4 text-center">
      Account created! Please sign in.
    </div>

    <!-- Error message -->
    <div id="errorMsg" class="hidden bg-red-50 text-red-600 text-sm px-4 py-2 rounded-lg mb-4 text-center">
      Invalid email or password.
    </div>

    <form action="/login" method="POST" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input name="email" type="email" required placeholder="you@example.com"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input name="password" type="password" required placeholder="••••••••"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm"/>
      </div>
      <button type="submit"
        class="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition text-sm">
        Sign In
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Don't have an account?
      <a href="/signup" class="text-blue-600 font-medium hover:underline">Sign up</a>
    </p>

    <div class="mt-6 p-3 bg-gray-50 rounded-lg text-xs text-gray-400 text-center">
      Admin: admin@crm.com / admin123
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("error")) document.getElementById("errorMsg").classList.remove("hidden");
    if (params.get("signup")) document.getElementById("signupSuccess").classList.remove("hidden");
  </script>
</body>
</html>
