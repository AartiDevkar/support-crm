<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Support CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Top Navbar -->
  <nav class="bg-blue-700 text-white px-6 py-4 flex justify-between items-center shadow">
    <h1 class="text-xl font-bold">🎫 Support CRM</h1>
    <a href="/create" class="bg-white text-blue-700 font-semibold px-4 py-2 rounded hover:bg-blue-50">
      + New Ticket
    </a>
  </nav>

  <div class="max-w-6xl mx-auto px-4 py-8">

    <!-- Search and Filter Bar -->
    <div class="flex flex-col sm:flex-row gap-3 mb-6">
      <input
        id="searchInput"
        type="text"
        placeholder="Search by name, email, subject, ticket ID..."
        class="flex-1 border border-gray-300 rounded px-4 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        oninput="loadTickets()"
      />
      <select
        id="statusFilter"
        class="border border-gray-300 rounded px-4 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        onchange="loadTickets()"
      >
        <option value="">All Statuses</option>
        <option value="Open">Open</option>
        <option value="In Progress">In Progress</option>
        <option value="Closed">Closed</option>
      </select>
    </div>

    <!-- Tickets Table -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <table class="w-full text-sm text-left">
        <thead class="bg-blue-700 text-white uppercase text-xs">
          <tr>
            <th class="px-4 py-3">Ticket ID</th>
            <th class="px-4 py-3">Customer</th>
            <th class="px-4 py-3">Subject</th>
            <th class="px-4 py-3">Status</th>
            <th class="px-4 py-3">Created</th>
            <th class="px-4 py-3">Action</th>
          </tr>
        </thead>
        <tbody id="ticketTableBody">
          <tr><td colspan="6" class="text-center py-8 text-gray-400">Loading tickets...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script>
    // Color badge for status
    function statusBadge(status) {
      const colors = {
        "Open": "bg-green-100 text-green-700",
        "In Progress": "bg-yellow-100 text-yellow-700",
        "Closed": "bg-gray-200 text-gray-600"
      };
      return `<span class="px-2 py-1 rounded-full text-xs font-semibold ${colors[status] || ''}">${status}</span>`;
    }

    // Fetch and display tickets
    async function loadTickets() {
      const search = document.getElementById("searchInput").value;
      const status = document.getElementById("statusFilter").value;

      let url = `/api/tickets?`;
      if (search) url += `search=${encodeURIComponent(search)}&`;
      if (status) url += `status=${encodeURIComponent(status)}`;

      const res = await fetch(url);
      const tickets = await res.json();
      const tbody = document.getElementById("ticketTableBody");

      if (tickets.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-gray-400">No tickets found.</td></tr>`;
        return;
      }

      tbody.innerHTML = tickets.map(t => `
        <tr class="border-t hover:bg-gray-50">
          <td class="px-4 py-3 font-mono text-blue-600">${t.ticket_id}</td>
          <td class="px-4 py-3">
            <div class="font-medium">${t.customer_name}</div>
            <div class="text-gray-400 text-xs">${t.customer_email}</div>
          </td>
          <td class="px-4 py-3">${t.subject}</td>
          <td class="px-4 py-3">${statusBadge(t.status)}</td>
          <td class="px-4 py-3 text-gray-500 text-xs">${t.created_at}</td>
          <td class="px-4 py-3">
            <a href="/ticket/${t.ticket_id}" class="text-blue-600 hover:underline text-xs font-medium">View →</a>
          </td>
        </tr>
      `).join("");
    }

    // Load tickets when page opens
    loadTickets();
  </script>

</body>
</html>
