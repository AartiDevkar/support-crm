<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Ticket | Support CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center shadow-sm">
    <span class="text-xl font-bold text-blue-600">🎫 Support CRM</span>
    <a href="/" class="text-sm text-gray-600 hover:text-blue-600 font-medium">← Back to Tickets</a>
  </nav>

  <div class="max-w-2xl mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-1">Create New Ticket</h2>
      <p class="text-sm text-gray-500 mb-6">Describe your issue and we'll get back to you.</p>

      <form action="/api/tickets" method="POST" class="space-y-5">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Subject <span class="text-red-500">*</span></label>
          <input name="subject" required type="text" placeholder="e.g. Unable to login to my account"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Description <span class="text-red-500">*</span></label>
          <textarea name="description" required rows="5"
            placeholder="Describe your issue in detail. Include steps to reproduce if applicable..."
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Priority</label>
          <select name="priority"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="Low">🟢 Low</option>
            <option value="Medium" selected>🟡 Medium</option>
            <option value="High">🟠 High</option>
            <option value="Urgent">🔴 Urgent</option>
          </select>
        </div>

        <div class="flex gap-3 pt-2">
          <button type="submit"
            class="flex-1 bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition text-sm">
            Submit Ticket
          </button>
          <a href="/"
            class="flex-1 text-center border border-gray-300 text-gray-600 font-semibold py-2.5 rounded-lg hover:bg-gray-50 transition text-sm">
            Cancel
          </a>
        </div>

      </form>
    </div>
  </div>

</body>
</html>
