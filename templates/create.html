<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Ticket</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <nav class="bg-blue-700 text-white px-6 py-4 flex justify-between items-center shadow">
    <h1 class="text-xl font-bold">🎫 Support CRM</h1>
    <a href="/" class="bg-white text-blue-700 font-semibold px-4 py-2 rounded hover:bg-blue-50">
      ← Back to Tickets
    </a>
  </nav>

  <div class="max-w-2xl mx-auto px-4 py-10">
    <div class="bg-white rounded-lg shadow p-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">Create New Ticket</h2>

      <form action="/api/tickets" method="POST" class="space-y-5">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Customer Name</label>
          <input name="customer_name" required type="text" placeholder="e.g. Priya Sharma"
            class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Customer Email</label>
          <input name="customer_email" required type="email" placeholder="e.g. priya@example.com"
            class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Issue Subject</label>
          <input name="subject" required type="text" placeholder="e.g. Unable to login"
            class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea name="description" required rows="4" placeholder="Describe the issue in detail..."
            class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
        </div>

        <button type="submit"
          class="w-full bg-blue-700 text-white font-semibold py-2 rounded hover:bg-blue-800 transition">
          Submit Ticket
        </button>

      </form>
    </div>
  </div>

</body>
</html>
